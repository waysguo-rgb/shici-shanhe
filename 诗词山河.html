<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>诗词山河</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Long+Cang&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
body{font-family:'Noto Serif SC',serif;color:#f0e0b8;
  background:
    radial-gradient(ellipse 85% 80% at 50% 50%,#b8a068 0%,#a89058 30%,#8c7040 60%,#6e5428 88%,#4a3620 100%),
    #3a2810;
  background-attachment:fixed}
#cv{position:fixed;inset:0;z-index:0;background:transparent}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none}
#hdr{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:30;pointer-events:none}
#hdr-in{background:rgba(240,220,170,0.82);backdrop-filter:blur(6px);padding:11px 38px;border-radius:2px;border:1px solid rgba(120,80,35,0.55);text-align:center;box-shadow:0 4px 22px rgba(60,35,10,0.5),inset 0 0 22px rgba(180,130,60,0.25)}
#hdr h1{font-family:'Ma Shan Zheng',cursive;font-size:36px;color:#2a1a08;letter-spacing:8px;text-shadow:0 1px 1px rgba(255,240,200,0.9),0 0 8px rgba(255,220,150,0.4)}
#hdr p{font-size:11px;font-weight:600;color:#5a3a15;letter-spacing:3px}
#labels{position:absolute;inset:0;z-index:15;pointer-events:none}
.lb{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;pointer-events:auto;transition:opacity .3s;will-change:transform}
.loc-n{font-family:'Ma Shan Zheng',cursive;writing-mode:vertical-rl;text-orientation:upright;font-size:21px;color:#2a1208;letter-spacing:4px;padding:3px 2px;font-weight:700;text-shadow:0 0 7px rgba(252,238,205,1),0 0 3px rgba(252,238,205,1),0 0 2px rgba(252,238,205,1),0 1px 2px rgba(255,245,220,0.95);transition:all .3s}
.lb:hover .loc-n{color:#8a1a08;text-shadow:0 0 10px rgba(255,240,200,1),0 0 5px rgba(255,240,200,1),0 0 3px rgba(255,240,200,1)}
.loc-dot{display:none}
.lb.on .loc-n{font-size:24px;color:#a82010;text-shadow:0 0 12px rgba(255,245,210,1),0 0 6px rgba(255,245,210,1),0 0 3px rgba(255,245,210,1),0 1px 2px rgba(255,245,220,0.95)}
#rlbls{position:absolute;inset:0;z-index:13;pointer-events:none}
.rlb{position:absolute;font-family:'Ma Shan Zheng',cursive;font-size:21px;color:#0e2a48;letter-spacing:6px;text-shadow:0 0 8px rgba(255,248,215,1),0 0 5px rgba(255,248,215,1),0 0 3px rgba(255,248,215,1),0 1px 2px rgba(255,245,220,0.95);writing-mode:vertical-rl;text-orientation:upright;font-weight:700;transform:translate(-50%,-50%);transition:opacity .3s;will-change:transform;white-space:nowrap}
.llb{position:absolute;font-family:'ZCOOL XiaoWei','Ma Shan Zheng',serif;font-size:18px;color:#0a2338;letter-spacing:2px;text-shadow:0 0 7px rgba(235,245,255,1),0 0 4px rgba(235,245,255,1),0 1px 2px rgba(220,235,250,0.95);font-weight:700;transform:translate(-50%,-50%);transition:opacity .3s;will-change:transform;white-space:nowrap;pointer-events:none}
.pf{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:5px;margin-bottom:8px;pointer-events:none}
.pf-t{font-family:'Ma Shan Zheng',cursive;writing-mode:vertical-rl;font-size:15px;color:rgba(30,18,8,0.92);letter-spacing:2px;text-shadow:0 0 5px rgba(255,242,210,1),0 1px 2px rgba(255,242,210,0.98),0 0 7px rgba(255,230,180,0.8);animation:incense 7s ease-in-out infinite;font-weight:700}
.pf-a{font-family:'ZCOOL XiaoWei',serif;writing-mode:vertical-rl;text-orientation:upright;font-size:10px;color:rgba(70,40,15,0.88);letter-spacing:1px;margin-top:4px;text-shadow:0 0 3px rgba(255,242,210,1),0 1px 1px rgba(255,240,200,0.95)}
.pf-l{font-family:'Ma Shan Zheng',cursive;writing-mode:vertical-rl;font-size:14px;color:rgba(30,18,8,0.88);letter-spacing:2px;line-height:1.5;text-shadow:0 0 5px rgba(255,242,210,1),0 1px 2px rgba(255,240,200,0.98);opacity:0;animation:smokeIn 2.5s ease-out forwards,incense 9s ease-in-out infinite;font-weight:700}
@keyframes incense{0%,100%{transform:translateY(0)}30%{transform:translateY(-2px) translateX(.5px)}60%{transform:translateY(-3px) translateX(-.5px)}90%{transform:translateY(-1px)}}
@keyframes smokeIn{from{opacity:0;transform:translateY(8px);filter:blur(3px)}to{opacity:.55;transform:translateY(0);filter:blur(0)}}
#po{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;padding-bottom:40px}
#po.vis{display:flex}
#po-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(90,58,22,0.55) 0%,rgba(52,32,12,0.72) 100%);backdrop-filter:blur(6px);cursor:pointer}
#po-wrap{position:relative;display:flex;align-items:center;max-width:86vw;height:50vh;animation:unfurl 1.1s cubic-bezier(.22,.08,.28,1) forwards;transform-origin:right center}
@keyframes unfurl{
  0%{max-width:50px;opacity:.3}
  15%{opacity:.85}
  100%{max-width:86vw;opacity:1}
}
/* 卷轴轴柄：紫檀木主体 + 青玉端头 + 铜箍铜丝 (精致古韵) */
.roller{width:40px;height:calc(100% + 60px);flex-shrink:0;position:relative;z-index:5}
/* 紫檀木主体: 深褐红 + 侧面明暗渐变 + 细密竖向纹理 */
.roller-wood{position:absolute;left:10px;right:10px;top:26px;bottom:26px;background:
  repeating-linear-gradient(0deg,transparent 0,transparent 2.5px,rgba(0,0,0,0.22) 2.5px,rgba(0,0,0,0.22) 3px),
  linear-gradient(90deg,#0e0502 0%,#1f0a04 10%,#3a130a 28%,#5c220f 48%,#6a2a14 50%,#5c220f 52%,#3a130a 72%,#1f0a04 90%,#0e0502 100%);
background-blend-mode:multiply,normal;border-radius:1px;box-shadow:
  inset 0 0 5px rgba(0,0,0,0.7),
  inset -1px 0 0 rgba(255,180,130,0.06),
  inset 1px 0 0 rgba(255,180,130,0.04),
  0 3px 15px rgba(0,0,0,0.55)}
/* 铜箍 (木与玉之间的金属环, 上下各一对) */
.roller-band{position:absolute;left:3px;right:3px;height:4px;background:
  linear-gradient(180deg,#d8a856 0%,#b88438 25%,#8a5820 50%,#b88438 75%,#d8a856 100%);
border-radius:1px;box-shadow:0 0 3px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,230,170,0.6),inset 0 -1px 0 rgba(40,20,5,0.4);z-index:2}
.roller-band.top{top:22px}
.roller-band.bot{bottom:22px}
.roller-band2{position:absolute;left:4px;right:4px;height:1.5px;background:linear-gradient(180deg,#a07030,#5a3008);z-index:2}
.roller-band2.top{top:28px}
.roller-band2.bot{bottom:28px}
/* 青玉端头: 淡青玉色 + 微云纹 */
.roller-cap{position:absolute;left:0;right:0;height:26px;background:
  radial-gradient(ellipse at 50% 32%,
    #f4fbf6 0%,
    #d9ebd6 15%,
    #9cc7ae 38%,
    #5d8a77 68%,
    #2a4838 92%,
    #0f2015 100%),
  linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 40%,rgba(255,255,255,0.12) 70%,transparent 100%);
border:1px solid rgba(20,45,30,0.85);
box-shadow:
  0 4px 10px rgba(0,0,0,0.65),
  inset 0 -3px 5px rgba(0,0,0,0.35),
  inset 0 2px 4px rgba(255,255,255,0.55),
  0 0 2px rgba(180,220,195,0.4)}
.roller-cap.top{top:0;border-radius:6px 6px 2px 2px}
.roller-cap.bot{bottom:0;border-radius:2px 2px 6px 6px}
/* 玉端上的细云纹装饰 */
.roller-cap::after{content:'';position:absolute;left:20%;right:20%;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);transform:translateY(-2px)}
.roller-cap::before{content:'';position:absolute;left:30%;right:30%;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);transform:translateY(3px)}
/* 卷轴纸面: 单一宣纸色, 不再做渐变 */
#po-box{position:relative;background:rgba(232,208,155,0.96);border:none;padding:30px 60px;flex:1;height:100%;min-width:0;overflow-x:auto;overflow-y:hidden;box-shadow:0 8px 50px rgba(30,15,4,0.7),inset 0 0 60px rgba(180,130,60,0.18);clip-path:inset(0 0 0 0);animation:clipReveal 1.1s cubic-bezier(.22,.08,.28,1) forwards;cursor:grab;scrollbar-width:none;-ms-overflow-style:none}
#po-box::-webkit-scrollbar{display:none;width:0;height:0}
#po-box.dragging{cursor:grabbing}
#po-box.dragging *{cursor:grabbing!important}
@keyframes clipReveal{
  0%{clip-path:inset(0 0 0 100%)}
  100%{clip-path:inset(0 0 0 0)}
}
/* 极淡的纸纹, 不影响整体色调 */
#po-box::before{content:'';position:absolute;inset:0;pointer-events:none;background:
  repeating-linear-gradient(0deg,transparent 0,transparent 80px,rgba(110,70,30,0.015) 80px,rgba(110,70,30,0.015) 81px);
opacity:0.6}
#po-x{position:absolute;top:10px;right:14px;font-size:28px;color:#5a3010;cursor:pointer;background:none;border:none;font-family:'Noto Serif SC';transition:all .3s;z-index:20;line-height:1}
#po-x:hover{color:#8a1a08;transform:scale(1.1)}
/* 标题点击朗读 */
.pt{cursor:pointer;transition:color .25s,text-shadow .25s,transform .25s}
.pt:hover{color:#8a1a08;text-shadow:0 0 10px rgba(255,180,100,0.75),0 1px 2px rgba(255,240,200,0.95)}
.pt.pt-speaking{color:#b42a08;text-shadow:0 0 14px rgba(255,160,60,0.9),0 0 8px rgba(255,200,100,0.75);animation:ptPulse 1.4s ease-in-out infinite}
@keyframes ptPulse{0%,100%{text-shadow:0 0 10px rgba(255,160,60,0.75),0 0 5px rgba(255,200,100,0.55),0 1px 2px rgba(255,240,200,0.95)}50%{text-shadow:0 0 16px rgba(255,170,60,1),0 0 10px rgba(255,210,120,0.85),0 1px 2px rgba(255,240,200,0.98)}}
#po-c{display:flex;flex-direction:row-reverse;align-items:stretch;justify-content:flex-start;gap:42px;height:100%;padding:6px 30px 6px 10px;position:relative;z-index:2;width:max-content;min-width:100%}
.ph{display:flex;flex-direction:column;align-items:center;gap:12px;margin:0;padding:0 14px;border:none;min-width:70px}
.ps{width:36px;height:36px;border:2px solid #8a2818;color:#8a2818;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 0 10px rgba(138,40,24,0.35),inset 0 0 10px rgba(255,245,220,0.4);flex-shrink:0;background:rgba(255,245,220,0.35);border-radius:3px;font-family:'Ma Shan Zheng',cursive}
.pln{font-family:'Long Cang','Ma Shan Zheng',cursive;writing-mode:vertical-rl;font-size:50px;color:#2a1408;letter-spacing:8px;text-shadow:0 1px 2px rgba(255,240,200,0.9),0 0 14px rgba(255,220,150,0.5);line-height:1;font-weight:700}
.pms{display:flex;flex-direction:row-reverse;align-items:stretch;gap:38px;flex:0 0 auto;min-height:100%}
.pe{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:22px;padding:0;min-height:100%;flex:0 0 auto}
.pm{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;padding-top:6px}
.pt{font-family:'Long Cang','Ma Shan Zheng',cursive;writing-mode:vertical-rl;font-size:36px;color:#2a1408;letter-spacing:6px;line-height:1.1;font-weight:700;text-shadow:0 1px 2px rgba(255,240,200,0.8);max-height:100%}
.pt.pt-m{font-size:30px;letter-spacing:5px}
.pt.pt-s{font-size:24px;letter-spacing:4px}
.pt.pt-xs{font-size:20px;letter-spacing:3px;line-height:1.05}
.pa{font-family:'ZCOOL XiaoWei',serif;writing-mode:vertical-rl;text-orientation:upright;font-size:15px;color:#5a3a15;letter-spacing:2px;margin-top:6px}
.pexc{font-family:'ZCOOL XiaoWei',serif;writing-mode:vertical-rl;text-orientation:upright;font-size:12px;color:#8a4818;letter-spacing:2px;margin-top:4px;opacity:.75;font-style:italic}
/* 卷轴内侧的滚动提示箭头 */
.po-arr{position:absolute;top:50%;width:28px;height:56px;background:radial-gradient(ellipse at center,rgba(240,220,170,0.55),rgba(200,160,80,0.30));backdrop-filter:blur(4px);border:1px solid rgba(120,70,20,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .35s,background .25s,transform .25s;transform:translateY(-50%) scale(0.9);z-index:15;border-radius:3px;padding:0;box-shadow:0 2px 10px rgba(40,20,5,0.35)}
.po-arr svg{width:16px;height:16px;fill:#5a3010;filter:drop-shadow(0 1px 1px rgba(255,240,200,0.7))}
.po-arr.show{opacity:.65;transform:translateY(-50%) scale(1)}
.po-arr.show:hover{opacity:1;background:radial-gradient(ellipse at center,rgba(255,235,180,0.75),rgba(220,180,100,0.5));transform:translateY(-50%) scale(1.06)}
#po-arr-l{left:58px}
#po-arr-r{right:58px}
.po-arr-breathe{animation:arrBreathe 2s ease-in-out infinite}
@keyframes arrBreathe{0%,100%{transform:translateY(-50%) scale(1) translateX(0)}50%{transform:translateY(-50%) scale(1.04) translateX(-3px)}}
#po-arr-r.po-arr-breathe{animation-name:arrBreatheR}
@keyframes arrBreatheR{0%,100%{transform:translateY(-50%) scale(1) translateX(0)}50%{transform:translateY(-50%) scale(1.04) translateX(3px)}}
/* 突出展示: 地点代表作 — 标题下方金色横线 + 朱砂印章着色 */
.pe.hl .ps{background:linear-gradient(135deg,rgba(255,215,120,0.6),rgba(230,160,60,0.45));border-color:#9a2810;color:#6a1408;box-shadow:0 0 14px rgba(255,180,60,0.55),inset 0 0 8px rgba(255,245,220,0.6)}
.pe.hl .pt{color:#1a0802;text-shadow:0 0 8px rgba(255,220,140,0.85),0 0 5px rgba(255,235,170,0.6),0 1px 2px rgba(255,240,200,0.95)}
.pe{position:relative}
.pl{display:flex;flex-direction:row-reverse;gap:22px;flex-wrap:nowrap;padding-right:6px}
.pv{font-family:'Liu Jian Mao Cao','Long Cang','Ma Shan Zheng',cursive;writing-mode:vertical-rl;font-size:30px;color:#2a1408;letter-spacing:7px;line-height:1.5;opacity:0;animation:li .7s ease forwards;text-shadow:0 1px 2px rgba(255,240,200,0.8),0 0 6px rgba(255,230,180,0.4);white-space:nowrap}
@keyframes popIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes li{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#ld{position:fixed;inset:0;z-index:1000;background:radial-gradient(ellipse at center,#b89060 0%,#503820 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .8s}
#ld.off{opacity:0;pointer-events:none}
#ld p{font-family:'Ma Shan Zheng',cursive;color:#2a1408;font-size:22px;letter-spacing:6px;text-shadow:0 1px 2px rgba(255,240,200,0.9),0 0 10px rgba(255,220,150,0.5)}
#ld .bar{width:220px;height:3px;background:rgba(60,35,10,0.3);border-radius:2px;overflow:hidden}
#ld .fill{height:100%;background:#5a2e10;border-radius:2px;transition:width .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#4a5553;border-radius:2px}
@media(max-width:768px){
#hdr h1{font-size:22px;letter-spacing:4px}
#hdr p{font-size:9px}
#hdr-in{padding:6px 18px}
.loc-n{font-size:14px;letter-spacing:3px}
.pf-t{font-size:11px}.pf-l{font-size:10px}
#po-wrap{height:60vh;max-width:94vw}
#po-box{padding:20px 30px}
.pln{font-size:32px;letter-spacing:5px}
.pt{font-size:24px;letter-spacing:4px}
.pv{font-size:22px;letter-spacing:5px}
.pms{gap:20px}
.pe{gap:14px}
.pl{gap:14px}
#po-c{gap:18px;padding:6px 20px}
.roller{width:24px}
.roller-cap{height:14px}
}
</style>
</head>
<body>

<div id="ui"><div id="hdr"><div id="hdr-in"><h1>诗词山河</h1><p id="sub"></p></div></div><div id="rlbls"></div><div id="labels"></div></div>
<div id="po"><div id="po-bg"></div><div id="po-wrap"><div class="roller"><div class="roller-cap top"></div><div class="roller-band2 top"></div><div class="roller-band top"></div><div class="roller-wood"></div><div class="roller-band bot"></div><div class="roller-band2 bot"></div><div class="roller-cap bot"></div></div><div id="po-box"><button id="po-x">&times;</button><div id="po-c"></div></div><button id="po-arr-l" class="po-arr" title="向左翻阅"><svg viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20 L17 18 L11 12 L17 6 Z"/></svg></button><button id="po-arr-r" class="po-arr" title="向右翻阅"><svg viewBox="0 0 24 24"><path d="M9 4 L17 12 L9 20 L7 18 L13 12 L7 6 Z"/></svg></button><div class="roller"><div class="roller-cap top"></div><div class="roller-band2 top"></div><div class="roller-band top"></div><div class="roller-wood"></div><div class="roller-band bot"></div><div class="roller-band2 bot"></div><div class="roller-cap bot"></div></div></div></div>

<script>

const R=[

const Z=5,TS=256,TX0=22,TX1=27,TY0=10,TY1=15,TC=TX1-TX0+1,TR_=TY1-TY0+1,MW=TC*TS,MH=TR_*TS;

function loadTile(tx,ty){return new Promise(res=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>res({img,tx,ty});img.onerror=()=>res(null);img.src=`https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${Z}/${tx}/${ty}.png`})}
async function loadDEM(){const j=[];for(let ty=TY0;ty<=TY1;ty++)for(let tx=TX0;tx<=TX1;tx++)j.push(loadTile(tx,ty));let d=0;const r=await Promise.all(j.map(p=>p.then(r=>{d++;prog.style.width=(d/j.length*40)+'%';return r})));const ok=r.filter(Boolean);if(!ok.length)return null;const c=document.createElement('canvas');c.width=MW;c.height=MH;const cx=c.getContext('2d');ok.forEach(({img,tx,ty})=>cx.drawImage(img,(tx-TX0)*TS,(ty-TY0)*TS));return cx.getImageData(0,0,MW,MH)}
function ll2px(lo,la){const px=((lo+180)/360*Math.pow(2,Z)-TX0)*TS;const lr=la*Math.PI/180;const py=((1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*Math.pow(2,Z)-TY0)*TS;return[px,py]}
function sampleDEM(lo,la){if(!hd)return null;const[px,py]=ll2px(lo,la);const x0=Math.floor(px),y0=Math.floor(py);if(x0<0||x0>=MW-1||y0<0||y0>=MH-1)return null;const fx=px-x0,fy=py-y0;const s=(x,y)=>{const i=(y*MW+x)*4;return(hd.data[i]*256+hd.data[i+1]+hd.data[i+2]/256)-32768};return s(x0,y0)*(1-fx)*(1-fy)+s(x0+1,y0)*fx*(1-fy)+s(x0,y0+1)*(1-fx)*fy+s(x0+1,y0+1)*fx*fy}

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function hash2(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n)}
function n2d(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,u=fade(fx),v=fade(fy);return(hash2(ix,iy)*(1-u)+hash2(ix+1,iy)*u)*(1-v)+(hash2(ix,iy+1)*(1-u)+hash2(ix+1,iy+1)*u)*v-0.5}
function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<(o||4);i++){v+=n2d(x*f,y*f)*a;t+=a;a*=.5;f*=2}return v/t}
function gauss(x,c,s){return Math.exp(-.5*((x-c)/s)**2)}
function smoothstep(a,b,x){const t=Math.max(0,Math.min(1,(x-a)/(b-a)));return t*t*(3-2*t)}
function ridge(lo,la,x0,y0,x1,y1,w,h){const dx=x1-x0,dy=y1-y0,l2=dx*dx+dy*dy;if(!l2)return h*gauss(lo,x0,w)*gauss(la,y0,w);const t=Math.max(0,Math.min(1,((lo-x0)*dx+(la-y0)*dy)/l2));const d=Math.sqrt((lo-(x0+t*dx))**2+(la-(y0+t*dy))**2);return h*Math.exp(-.5*(d/w)**2)}

  h+=ridge(lo,la,96,34,101,34,2,4200);h+=ridge(lo,la,108,28,111,30,1.5,1500);
  h+=ridge(lo,la,85,47,92,49,2,2500);h+=ridge(lo,la,105.8,38,106.5,40,.8,2800);
  // 高原盆地
  h+=4200*gauss(lo,88,12)*gauss(la,33,6);
  h+=1800*gauss(lo,104,5)*gauss(la,25,4);
  h+=1000*gauss(lo,112,10)*gauss(la,43,4);
  h+=1300*gauss(lo,108,5)*gauss(la,37,3);
  h-=2200*gauss(lo,105,3)*gauss(la,30.5,2.5);
  h-=3000*gauss(lo,83,6)*gauss(la,39,3);
  h-=2200*gauss(lo,86,5)*gauss(la,45,2.5);
  h-=800*gauss(lo,116,4)*gauss(la,36,4);
  h-=600*gauss(lo,117,5)*gauss(la,31,2);
  h-=900*gauss(lo,125,4)*gauss(la,45,4);
  // 平原压平（华北平原、长江中下游平原、东北平原）
  const plain=Math.max(
    gauss(lo,115,6)*gauss(la,35,4),   // 华北平原
    gauss(lo,117,5)*gauss(la,31,3),    // 长江中下游平原
    gauss(lo,125,5)*gauss(la,45,4)     // 东北平原
  );
  if(plain>0.1) h=h*(1-plain*0.8)+50*plain*0.8;
  // 噪声：仅在高海拔地区添加
  const nf=smoothstep(200,800,h);
  h+=fbm(lo*.3,la*.3,4)*500*cd*nf;
  h+=fbm(lo*.8+50,la*.8+50,3)*200*nf;
  h*=cd;
  return Math.max(1,h);
}

function getH(lo,la){
  if(!inLand(lo,la)){
    return -200-dBd(lo,la)*100;
  }
  const d=sampleDEM(lo,la);
  if(d!==null&&isFinite(d)){
    if(d<5)return -50;
    const nf=smoothstep(200,800,d);
    return d+n2d(lo*2.5,la*2.5)*50*nf*Math.min(1,Math.max(0,(d-100)/2000))+n2d(lo*8,la*8)*30*nf;
  }
  const p=procH(lo,la);return isFinite(p)?p:0;
}

// ★ 关键修改：分段缩放使平原保持平坦 ★
function scaleH(m){
  if(!isFinite(m))return -0.6;
  if(m<=0)return Math.max(-2,m*0.005-0.3);
  if(m<300)return m*0.0005;  // 平原：300m→0.15单位（几乎为零）
  if(m<600){const t=smoothstep(300,600,m);return 0.15*(1-t)+(0.15+Math.pow((600-200)/8800,.55)*8.5*((600-300)/8800))*t;}
  return Math.pow(m/9000,.55)*10;
}

const CL=105,CA=34,SX=1.6,SY=1.8;
function ll2s(lo,la){return[(lo-CL)*SX,-(la-CA)*SY]}
function s2ll(x,z){return[x/SX+CL,-z/SY+CA]}

// ═══════════════════════════════════════
// 配色（含积雪沙漠秋色黄土）
// ═══════════════════════════════════════
// 山水画配色：暖米平原 / 赭褐山岭 / 墨黑高峰 / 江南淡绿 / 青绿水岸
function tColor(h,lo,la){
  // 海洋/境外按 BD 边界判定 - 淡翠水色
  if(!inLand(lo,la)||h<5){return[.42,.55,.42]}
  // 墨绿山水层叠色阶
  const S=[
    [-5,  .50,.58,.38],  // 滩涂淡翠
    [10,  .48,.58,.30],  // 滨水草绿
    [60,  .44,.54,.28],  // 平原浅绿
    [200, .36,.48,.24],  // 低岗绿
    [400, .30,.42,.22],  // 丘陵青绿
    [700, .24,.36,.18],  // 低山深绿
    [1100,.20,.32,.16],  // 中山墨绿
    [1500,.16,.28,.14],  // 山地墨绿
    [2000,.13,.24,.13],  // 高山墨绿
    [2400,.11,.22,.11],  // 险山深墨绿
    [2800,.10,.20,.10],  // 险山深墨绿
    [3400,.09,.19,.10],  // 极山墨
    [4000,.09,.18,.11],  // 高原墨
    [4600,.10,.19,.12],  // 高原墨
    [5200,.14,.22,.15],  // 高原渐亮
    [5800,.28,.34,.26],  // 雪线前
    [6500,.60,.66,.58],  // 高雪带青
    [7500,.88,.90,.85]   // 极峰雪
  ];
  let r,g,b;
  if(h<=S[0][0]){[,r,g,b]=S[0]}
  else if(h>=S[S.length-1][0]){[,r,g,b]=S[S.length-1]}
  else{for(let i=0;i<S.length-1;i++){if(h>=S[i][0]&&h<S[i+1][0]){const t=(h-S[i][0])/(S[i+1][0]-S[i][0]);const u=t*t*(3-2*t);r=S[i][1]+(S[i+1][1]-S[i][1])*u;g=S[i][2]+(S[i+1][2]-S[i][2])*u;b=S[i][3]+(S[i+1][3]-S[i][3])*u;break}}}
  if(r===undefined){r=.6;g=.4;b=.25}

  // —— 沙漠/戈壁/黄土：偏明赭黄 ——
  const desert=Math.max(0,
    gauss(lo,83,7)*gauss(la,39,4)*.95+
    gauss(lo,102,6)*gauss(la,40,3)*.65+
    gauss(lo,86,6)*gauss(la,45,3)*.50+
    gauss(lo,108,4)*gauss(la,38,3)*.55
  );
  if(desert>.06&&h>-5&&h<4000){
    const k=Math.min(.75,desert);
    r=r*(1-k)+.82*k;g=g*(1-k)+.68*k;b=b*(1-k)+.38*k;
  }

  // —— 江南/岭南绢绿：淡翠 ——
  const veg=Math.max(0,
    gauss(lo,113,8)*gauss(la,26,6)*1.0+
    gauss(lo,109,6)*gauss(la,30,4)*.85+
    gauss(lo,118,5)*gauss(la,28,4)*.95+
    gauss(lo,128,5)*gauss(la,46,5)*.75+
    gauss(lo,101,4)*gauss(la,25,4)*.95+
    gauss(lo,116,4)*gauss(la,32,4)*.75
  );
  if(veg>.05&&h>10&&h<1500){
    const v=Math.min(.60,veg)*(1-smoothstep(1000,1600,h));
    r=r*(1-v*.30)+.55*v*.30;
    g=g*(1-v*.10)+.62*v*.10;
    b=b*(1-v*.30)+.36*v*.30;
  }

  // —— 树木点苔 ——
  if(h>30&&h<2800){
    const tree=n2d(lo*8,la*8)+n2d(lo*16+17,la*16+17)*.5;
    const treeMask=smoothstep(40,300,h)*(1-smoothstep(2000,2800,h));
    const tStr=Math.max(0,tree)*.08*treeMask;
    r-=tStr*.45;g-=tStr*.35;b-=tStr*.55;
  }

  // —— 山脊皴法：脊线压暗 ——
  const ridgeNoise=Math.abs(n2d(lo*2,la*2))*Math.abs(n2d(lo*4+33,la*4+33));
  if(h>400){
    const inkStrength=Math.min(1,(h-400)/1200)*ridgeNoise*2.0;
    r-=inkStrength*.16;g-=inkStrength*.14;b-=inkStrength*.10;
  }

  // —— 山脊层次：高处脊线更深更黑 ——
  if(h>800){
    const layerNoise=Math.abs(n2d(lo*3,la*3))*Math.abs(n2d(lo*6+19,la*6+19));
    const layer=smoothstep(800,3000,h)*layerNoise*1.8;
    r-=layer*.10;g-=layer*.13;b-=layer*.08;
  }
  // —— 高峰冷光反射（极淡蓝灰） ——
  if(h>2500){
    const peak=smoothstep(2500,4500,h);
    const peakNoise=(n2d(lo*5,la*5)*.5+.5);
    const coolWash=peak*peakNoise*.20;
    r=r*(1-coolWash)+.28*coolWash;
    g=g*(1-coolWash)+.34*coolWash;
    b=b*(1-coolWash)+.32*coolWash;
  }

  // —— 山脚晕染 ——
  if(h>100&&h<2200){
    const wash=n2d(lo*0.8,la*0.8)*0.5+0.5;
    const washStr=wash*0.06*smoothstep(100,800,h);
    r-=washStr;g-=washStr*0.95;b-=washStr*0.85;
  }

  // —— 阴阳坡向 ——
  const slope=n2d(lo*3.5,la*3.5)*.05;
  r+=slope*1.1;g+=slope;b+=slope*.75;

  // —— 绢本颗粒 ——
  const grain=n2d(lo*12,la*12)*.022+n2d(lo*28+99,la*28+99)*.012;
  return[
    Math.max(0,Math.min(1,r+grain)),
    Math.max(0,Math.min(1,g+grain*.85)),
    Math.max(0,Math.min(1,b+grain*.65))
  ];
}

// 平滑地形构建 + 高度图
// ═══════════════════════════════════════
const PW=130,PH=90;
let terrainRef=null,hMap=null,hMapLo=null,terrainLOD=null;
// LOD 低分辨率 mesh 的引用, 用于 buildHMapLo 构建第二套高度图
let terrainLoRef=null;

async function buildTerrain(sgwt,sght){
  const geo=new THREE.PlaneGeometry(PW,PH,sgwt,sght);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;const total=pos.count;
  // 第一遍：设置高度
  for(let i=0;i<total;i++){
    const sx=pos.getX(i),sz=pos.getZ(i);
    const[lo,la]=s2ll(sx,sz);
    const hm=getH(lo,la);
    const inL=inLand(lo,la);
    const sy=inL?scaleH(hm):0;
    pos.setY(i,isFinite(sy)?sy:0);
  }
  geo.computeVertexNormals();
  // 第二遍：烘焙着色（将Lambert光照烘焙到顶点色）
  const cols=[];
  const BGC=[.60,.48,.22];
  const nor=geo.attributes.normal;
  // 主光方向（世界空间）
  const lx=-30,ly=70,lz=25;
  const ll=Math.hypot(lx,ly,lz);
  const ldx=lx/ll,ldy=ly/ll,ldz=lz/ll;
  // 副光
  const l2x=40,l2y=40,l2z=-30;
  const l2l=Math.hypot(l2x,l2y,l2z);
  const l2dx=l2x/l2l,l2dy=l2y/l2l,l2dz=l2z/l2l;
  for(let s=0;s<total;s+=3000){
    const end=Math.min(s+3000,total);
    for(let i=s;i<end;i++){
      const sx=pos.getX(i),sz=pos.getZ(i);
      const[lo,la]=s2ll(sx,sz);
      const hm=getH(lo,la);
      const inL=inLand(lo,la);
      const[r,g,b]=tColor(isFinite(hm)?hm:0,lo,la);
      let fr=r,fg=g,fb=b;
      if(!inL){
        const dist=dBd(lo,la);
        const t=Math.min(1,Math.max(0,dist/2.5));
        const u=t*t*(3-2*t);
        fr=r*(1-u)+BGC[0]*u;
        fg=g*(1-u)+BGC[1]*u;
        fb=b*(1-u)+BGC[2]*u;
      }
      // 烘焙光照（陆地）
      if(inL){
        const nx=nor.getX(i),ny=nor.getY(i),nz=nor.getZ(i);
        const nd1=Math.max(0,nx*ldx+ny*ldy+nz*ldz);
        const nd2=Math.max(0,nx*l2dx+ny*l2dy+nz*l2dz);
        const amb=0.65;
        const dir1=0.55*nd1;
        const dir2=0.18*nd2;
        const shade=amb+dir1+dir2;
        fr=Math.min(1,fr*shade);
        fg=Math.min(1,fg*shade);
        fb=Math.min(1,fb*shade*0.98);
      }
      // 透明度计算: 陆地不透明, 远离陆地 + 靠近平面边缘时渐变为透明
      // 这样地形平面的方形边缘不会在斜视角下形成明显的对角线
      let alpha;
      if(inL){
        alpha=1.0;
      }else{
        // 到陆地边界的距离 (度), 近陆地依然有 BGC 色作为晕染
        const dLand=dBd(lo,la);
        // 到平面边缘的距离 (世界单位) — 平面是 PW×PH 矩形, 中心在 (PW/2 偏移)
        // PlaneGeometry 默认中心在 (0,0), 所以边缘距离 = min(半宽-|x|, 半高-|z|)
        const edgeD=Math.min(PW/2-Math.abs(sx),PH/2-Math.abs(sz));
        // 陆地近旁 (<1°): 仍然不透明, 做海岸晕染
        // 陆地远处 + 靠近平面边: 线性淡出到 0
        const landFade=Math.min(1,dLand/2.2);  // 0 (陆地边) → 1 (远离陆地 2.2°)
        const edgeFade=Math.max(0,Math.min(1,(edgeD-3)/18));  // 边缘 3 单位内全透, 距边 21 单位起满
        // 最终 alpha: 近陆地保留 BGC 晕染, 远陆地完全透 (显示 body 背景)
        alpha=edgeFade*(1-landFade*0.9);
      }
      cols.push(fr,fg,fb,alpha);
    }
    await new Promise(r=>setTimeout(r,0));
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,4));
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,depthWrite:true}));
}

// ═══════════════════════════════════════
// 沿河流路径在地形上刻蚀河谷 (多 pass 宽谷 + 平滑)
// ═══════════════════════════════════════
async function carveRivers(mesh,sgwt,sght){
  if(!mesh)return;
  const geo=mesh.geometry;
  const pos=geo.attributes.position;
  const cols=geo.attributes.color;

  // 顶点索引查找函数
  const vertIdx=(gx,gz)=>{
    if(gx<0||gx>sgwt||gz<0||gz>sght)return -1;
    return gz*(sgwt+1)+gx;
  };

  // 水色（深河谷中心）
  const bankR=[0.76,0.62,0.38],bankG=[0.48,0.56,0.38],valleyC=[0.18,0.32,0.35];

  // 距离场：每个顶点到最近河流中心线的距离
  const nearestDist=new Float32Array(pos.count).fill(999);
  // 按河流宽度归一化的距离（用于染色，让大河视觉上比小河粗）
  const nearestNormDist=new Float32Array(pos.count).fill(999);
  // 每个顶点的目标"河谷底"高度（由最近河流决定）
  const valleyFloorY=new Float32Array(pos.count);
  const origY=new Float32Array(pos.count);
  for(let i=0;i<pos.count;i++)origY[i]=pos.getY(i);

  // 收集所有河流的插值点
  const allRivers=RIVERS.map(r=>{
    const ctrl=r.c.map(([lo,la])=>{
      const[x,z]=ll2s(lo,la);
      return new THREE.Vector3(x,0,z);
    });
    const curve=new THREE.CatmullRomCurve3(ctrl,false,'catmullrom',0.5);
    const pts=curve.getPoints(400);
    return {r,pts};
  });

  // 宽河谷参数: 适度加深, 主要靠染色展现河流
  allRivers.forEach(({r,pts})=>{
    // 河宽缩放因子: 长江(0.45)→1.255, 渭河(0.18)→0.962, 约 30% 差异
    const wScale=0.85+r.w*0.90;
    const valleyR=Math.max(1.2,r.w*4.5);  // 河心核心区
    const outerR=valleyR*2.5;              // 缓坡过渡半径 (更柔)
    const maxDepth=0.35+r.w*0.25;          // 浅谷底 (主要靠染色)
    const radInGridX=Math.ceil(outerR/PW*sgwt)+1;
    const radInGridZ=Math.ceil(outerR/PH*sght)+1;

    pts.forEach(rp=>{
      const fgx=(rp.x+PW/2)/PW*sgwt;
      const fgz=(rp.z+PH/2)/PH*sght;
      const cgx=Math.round(fgx);
      const cgz=Math.round(fgz);
      for(let dz=-radInGridZ;dz<=radInGridZ;dz++){
        for(let dx=-radInGridX;dx<=radInGridX;dx++){
          const gx=cgx+dx,gz=cgz+dz;
          const idx=vertIdx(gx,gz);
          if(idx<0)continue;
          const vx=pos.getX(idx);
          const vz=pos.getZ(idx);
          const ddx=vx-rp.x,ddz=vz-rp.z;
          const d=Math.sqrt(ddx*ddx+ddz*ddz);
          if(d>=outerR)continue;
          if(d<nearestDist[idx]){
            nearestDist[idx]=d;
            // 计算该顶点的目标河谷高度
            const orig=origY[idx];
            let targetY;
            if(d<=valleyR){
              // 核心区：完全压到深度 maxDepth 以下
              targetY=orig-maxDepth;
            }else{
              // 缓坡过渡区：平滑从 maxDepth 渐变到 0
              const t=(d-valleyR)/(outerR-valleyR);
              const k=1-t*t*(3-2*t); // 平滑 1→0
              targetY=orig-maxDepth*k;
            }
            valleyFloorY[idx]=targetY;
          }
          // 归一化距离：按河流宽度缩放，让大河影响半径更大
          const nd=d/wScale;
          if(nd<nearestNormDist[idx])nearestNormDist[idx]=nd;
        }
      }
    });
  });

  // 应用: 将每个被影响的顶点压到 min(原高度, 谷底高度)
  for(let i=0;i<pos.count;i++){
    if(nearestDist[i]>=999)continue;
    const orig=origY[i];
    const target=valleyFloorY[i];
    if(target<orig){
      pos.setY(i,target);
    }
  }

  // 平滑 pass: 对河流影响区域做 3x3 平均滤波 (重复 3 次)
  // 消除相邻高低顶点造成的尖刺, 让河谷壁过渡更自然
  const YIELD_EVERY=Math.max(40,Math.floor(sght/8));
  for(let pass=0;pass<3;pass++){
    const smoothed=new Float32Array(pos.count);
    for(let i=0;i<pos.count;i++)smoothed[i]=pos.getY(i);
    for(let gz=1;gz<sght;gz++){
      for(let gx=1;gx<sgwt;gx++){
        const idx=gz*(sgwt+1)+gx;
        if(nearestDist[idx]>=999)continue; // 只平滑河谷区
        // 3x3 邻居平均
        let sum=0,cnt=0;
        for(let dz=-1;dz<=1;dz++){
          for(let dx=-1;dx<=1;dx++){
            const ni=(gz+dz)*(sgwt+1)+(gx+dx);
            sum+=pos.getY(ni);
            cnt++;
          }
        }
        smoothed[idx]=sum/cnt;
      }
      // 每 YIELD_EVERY 行让出一次控制权 (大量顶点时避免卡 UI)
      if(gz%YIELD_EVERY===0)await new Promise(r=>setTimeout(r,0));
    }
    for(let i=0;i<pos.count;i++){
      if(nearestDist[i]<999){
        // 混合原值和平滑值(保留部分原始起伏)
        const orig=pos.getY(i);
        pos.setY(i,orig*0.3+smoothed[i]*0.7);
      }
    }
    // 每 pass 之后让出控制权
    await new Promise(r=>setTimeout(r,0));
  }

  // 染色: 河流线完全由地形顶点色表达
  // 使用三段锐化色阶: 深青河心 → 沙岸 → 远岸淡青
  if(cols){
    // 河心色: 鲜明深青, 亮度中等偏高, 饱和度高
    const riverCore=[0.12,0.35,0.52];  // 深青蓝
    const riverEdge=[0.30,0.56,0.66];  // 浅青 (河心→沙岸过渡)
    const sandColor=[0.78,0.64,0.38];  // 沙岸土黄
    const moistColor=[0.44,0.56,0.38]; // 湿润近岸

    // 顶点色不再承担河流视觉 — 只在河谷两侧加一点点"湿润"暗示
    // 主视觉改由 mkRiver 生成的细丝 mesh 表达
    const moistRad=0.80;  // 湿润带半径 (归一化)

    for(let i=0;i<pos.count;i++){
      const dist=nearestNormDist[i];
      if(dist>=moistRad)continue;

      // 只做一层湿润色混合: 深青湿润色, 混合比例很低, 过渡极柔
      let mixR,mixG,mixB,blend;
      const t=dist/moistRad;  // 0 (河心) → 1 (边缘)
      const k=1-t*t*(3-2*t);  // smoothstep 反向: 1 → 0
      mixR=moistColor[0];mixG=moistColor[1];mixB=moistColor[2];
      blend=0.28*k;  // 最大 28% 混合, 只是一点湿润感

      const r=cols.getX(i);
      const g=cols.getY(i);
      const b=cols.getZ(i);
      cols.setXYZ(i,
        r*(1-blend)+mixR*blend,
        g*(1-blend)+mixG*blend,
        b*(1-blend)+mixB*blend
      );
    }
    cols.needsUpdate=true;
  }

  pos.needsUpdate=true;
  geo.computeVertexNormals();
}

// ★ 从已渲染的地形网格直接采样精确高度 ★
function buildHMap(){
  if(!terrainRef)return;
  const pos=terrainRef.geometry.attributes.position;
  hMap=[];
  for(let j=0;j<=SGHT;j++){
    hMap[j]=new Float32Array(SGWT+1);
    for(let i=0;i<=SGWT;i++) hMap[j][i]=pos.getY(j*(SGWT+1)+i);
  }
}
// 低分 LOD 层的平行高度图
function buildHMapLo(){
  if(!terrainLoRef)return;
  const pos=terrainLoRef.geometry.attributes.position;
  hMapLo=[];
  for(let j=0;j<=LOD_LO_H;j++){
    hMapLo[j]=new Float32Array(LOD_LO_W+1);
    for(let i=0;i<=LOD_LO_W;i++) hMapLo[j][i]=pos.getY(j*(LOD_LO_W+1)+i);
  }
}
function hAt(x,z){
  if(!hMap)return 0;
  const gx=(x+PW/2)/PW*SGWT,gz=(z+PH/2)/PH*SGHT;
  const ix=Math.floor(gx),iz=Math.floor(gz);
  if(ix<0||ix>=SGWT||iz<0||iz>=SGHT)return 0;
  const fx=gx-ix,fz=gz-iz;
  return hMap[iz][ix]*(1-fx)*(1-fz)+hMap[iz][ix+1]*fx*(1-fz)+hMap[iz+1][ix]*(1-fx)*fz+hMap[iz+1][ix+1]*fx*fz;
}
function hAtLo(x,z){
  if(!hMapLo)return -999;
  const gx=(x+PW/2)/PW*LOD_LO_W,gz=(z+PH/2)/PH*LOD_LO_H;
  const ix=Math.floor(gx),iz=Math.floor(gz);
  if(ix<0||ix>=LOD_LO_W||iz<0||iz>=LOD_LO_H)return -999;
  const fx=gx-ix,fz=gz-iz;
  return hMapLo[iz][ix]*(1-fx)*(1-fz)+hMapLo[iz][ix+1]*fx*(1-fz)+hMapLo[iz+1][ix]*(1-fx)*fz+hMapLo[iz+1][ix+1]*fx*fz;
}
// 河流用: 取两种 LOD 下地形的 MAX, 保证 ribbon 高度能同时适应两种分辨率
function hAtMax(x,z){
  const a=hAt(x,z);
  const b=hAtLo(x,z);
  return b>a?b:a;
}

// ═══════════════════════════════════════
// 海面 + 波浪 + 海岸浪花
// ═══════════════════════════════════════
let seaMesh,seaBaseY,seaCoastal,seaBaseCol;

function buildSea(){
  // 用椭圆软边海面，让边缘渐变融入宣纸背景
  const geo=new THREE.PlaneGeometry(200,160,SEA_SEG,SEA_SEG);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  seaBaseY=new Float32Array(pos.count);
  const cols=[];
  const cx=8,cz=0; // 椭圆中心（地图中心）
  const rx=85,rz=65;  // 椭圆半径
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    seaBaseY[i]=-0.04;
    pos.setY(i,-0.04);
    // 椭圆归一化距离
    const d=Math.sqrt(((x-cx)/rx)**2+((z-cz)/rz)**2);
    // 软边：靠中心浓，靠边透明
    const alpha=Math.max(0,Math.min(1,1.4-d));
    const fade=Math.pow(alpha,1.5);
    // 柔和的青绿水面
    const noise=n2d(x*.15,z*.15)*.04+n2d(x*.4+50,z*.4+50)*.02;
    const r=0.42+noise*.3;
    const g=0.55+noise*.3;
    const b=0.38+noise*.3;
    cols.push(r,g,b,fade);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,4));
  const mat=new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,opacity:1.0,depthWrite:false});
  seaMesh=new THREE.Mesh(geo,mat);
  seaMesh.renderOrder=-1;
  return seaMesh;
}

// ═══════════════════════════════════════
// 宽河流 + 独立材质 + 正确方向
// ═══════════════════════════════════════
function mkWaterTex(){
  const W=1024,H=256;
  const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d');
  // 横截面渐变：左岸沙滩 → 浅水 → 深水 → 浅水 → 右岸沙滩
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,    'rgba(180,150,100,0.95)'); // 左岸沙色
  bg.addColorStop(0.06, 'rgba(200,172,120,0.92)');
  bg.addColorStop(0.12, 'rgba(160,190,160,0.88)'); // 浅滩淡翠
  bg.addColorStop(0.22, 'rgba(80,150,145,0.96)');  // 中浅
  bg.addColorStop(0.38, 'rgba(35,95,100,1)');      // 深水
  bg.addColorStop(0.50, 'rgba(18,65,78,1)');       // 最深
  bg.addColorStop(0.62, 'rgba(35,95,100,1)');
  bg.addColorStop(0.78, 'rgba(80,150,145,0.96)');
  bg.addColorStop(0.88, 'rgba(160,190,160,0.88)');
  bg.addColorStop(0.94, 'rgba(200,172,120,0.92)');
  bg.addColorStop(1,    'rgba(180,150,100,0.95)');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // 细横向流线（深浅变化）
  cx.globalAlpha=0.55;
  for(let i=0;i<180;i++){
    const yy=H*0.15+Math.random()*H*0.70;
    const len=60+Math.random()*260;
    const xx=Math.random()*W;
    const isDark=Math.random()<0.4;
    const grad=cx.createLinearGradient(xx,0,xx+len,0);
    if(isDark){
      grad.addColorStop(0,'rgba(10,40,55,0)');
      grad.addColorStop(0.5,'rgba(10,40,55,0.65)');
      grad.addColorStop(1,'rgba(10,40,55,0)');
    }else{
      grad.addColorStop(0,'rgba(170,225,220,0)');
      grad.addColorStop(0.5,'rgba(170,225,220,0.55)');
      grad.addColorStop(1,'rgba(170,225,220,0)');
    }
    cx.fillStyle=grad;cx.fillRect(xx,yy-0.5,len,1);
  }
  cx.globalAlpha=1;

  // 细微涡流（深色斑块）
  cx.globalAlpha=0.35;
  for(let i=0;i<30;i++){
    const xx=Math.random()*W;
    const yy=H*0.30+Math.random()*H*0.40;
    const rr=20+Math.random()*40;
    const g=cx.createRadialGradient(xx,yy,0,xx,yy,rr);
    g.addColorStop(0,'rgba(8,35,50,0.4)');
    g.addColorStop(1,'rgba(8,35,50,0)');
    cx.fillStyle=g;
    cx.beginPath();cx.ellipse(xx,yy,rr,rr*0.4,0,0,6.28);cx.fill();
  }
  cx.globalAlpha=1;

  // 沙滩纹理点
  cx.globalAlpha=0.45;
  for(let i=0;i<200;i++){
    // 上岸
    const xx=Math.random()*W;
    const yy=Math.random()*H*0.10;
    cx.fillStyle=`rgba(${140+Math.random()*40|0},${110+Math.random()*30|0},${70+Math.random()*30|0},${Math.random()*0.7})`;
    cx.fillRect(xx,yy,Math.random()*1.5+0.5,Math.random()*1+0.5);
    // 下岸
    const yy2=H*0.90+Math.random()*H*0.10;
    cx.fillStyle=`rgba(${140+Math.random()*40|0},${110+Math.random()*30|0},${70+Math.random()*30|0},${Math.random()*0.7})`;
    cx.fillRect(xx,yy2,Math.random()*1.5+0.5,Math.random()*1+0.5);
  }
  cx.globalAlpha=1;

  const t=new THREE.CanvasTexture(c);
  t.wrapS=THREE.RepeatWrapping;t.wrapT=THREE.ClampToEdgeWrapping;
  t.repeat.set(4,1);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

// ═══════════════════════════════════════
// 丝线水纹: 用于"发丝"河流, 饱和青色细线 + 柔和透明边缘
// ═══════════════════════════════════════
function mkSilkTex(){
  const W=1024,H=128;
  const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d');
  cx.clearRect(0,0,W,H);
  // 核心纵向渐变: 边缘柔和透明 → 中心实心饱和深青
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,    'rgba(25,65,95,0)');
  bg.addColorStop(0.18, 'rgba(28,78,110,0.35)');
  bg.addColorStop(0.30, 'rgba(32,95,130,0.85)');
  bg.addColorStop(0.42, 'rgba(40,115,155,1.0)');
  bg.addColorStop(0.50, 'rgba(50,140,175,1.0)');   // 中心饱和色
  bg.addColorStop(0.58, 'rgba(40,115,155,1.0)');
  bg.addColorStop(0.70, 'rgba(32,95,130,0.85)');
  bg.addColorStop(0.82, 'rgba(28,78,110,0.35)');
  bg.addColorStop(1,    'rgba(25,65,95,0)');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // 流动方向性条纹: 深色波纹让水流看出方向
  cx.globalAlpha=0.38;
  for(let i=0;i<24;i++){
    const xx=Math.random()*W;
    const wl=120+Math.random()*180;
    const yOff=(Math.random()-0.5)*8;
    const grad=cx.createLinearGradient(xx,H/2+yOff,xx+wl,H/2+yOff);
    grad.addColorStop(0,   'rgba(15,55,80,0)');
    grad.addColorStop(0.5, 'rgba(15,55,80,0.75)');
    grad.addColorStop(1,   'rgba(15,55,80,0)');
    cx.fillStyle=grad;
    cx.fillRect(xx,H/2+yOff-1.5,wl,3);
  }
  // 亮色流线 (少量, 表达"闪光")
  cx.globalAlpha=0.35;
  for(let i=0;i<10;i++){
    const xx=Math.random()*W;
    const wl=80+Math.random()*140;
    const yOff=(Math.random()-0.5)*6;
    const grad=cx.createLinearGradient(xx,H/2+yOff,xx+wl,H/2+yOff);
    grad.addColorStop(0,   'rgba(185,225,240,0)');
    grad.addColorStop(0.5, 'rgba(185,225,240,0.9)');
    grad.addColorStop(1,   'rgba(185,225,240,0)');
    cx.fillStyle=grad;
    cx.fillRect(xx,H/2+yOff-0.6,wl,1.2);
  }
  cx.globalAlpha=1;

  const t=new THREE.CanvasTexture(c);
  t.wrapS=THREE.RepeatWrapping;t.wrapT=THREE.ClampToEdgeWrapping;
  t.repeat.set(6,1);
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

const riverMeshes=[];
const lakeMeshes=[];

// ═══════════════════════════════════════
// 湖泊水纹: 饱满的水面填充 + 涟漪高光 + 柔和明暗
// (不再是圆形径向渐变, 适配任意形状的多边形湖面)
// ═══════════════════════════════════════
function mkLakeTex(){
  const S=512;
  const c=document.createElement('canvas');c.width=S;c.height=S;const cx=c.getContext('2d');
  // 基础深蓝水色, 几乎填满
  cx.fillStyle='rgba(30,82,120,0.95)';
  cx.fillRect(0,0,S,S);
  // 柔和大范围深浅变化 (像水面的光影)
  const g=cx.createRadialGradient(S/2,S/2,S*0.05,S/2,S/2,S*0.75);
  g.addColorStop(0,    'rgba(45,110,150,0.65)'); // 中心稍亮
  g.addColorStop(0.4,  'rgba(30,82,120,0.0)');
  g.addColorStop(0.7,  'rgba(18,55,85,0.4)');    // 外围稍暗
  g.addColorStop(1,    'rgba(12,40,65,0.55)');
  cx.fillStyle=g;cx.fillRect(0,0,S,S);

  // 细碎涟漪 (白色小斑)
  cx.globalAlpha=0.45;
  for(let i=0;i<200;i++){
    const x=Math.random()*S;
    const y=Math.random()*S;
    const rr=0.5+Math.random()*1.6;
    cx.fillStyle='rgba(220,240,250,0.9)';
    cx.beginPath();cx.arc(x,y,rr,0,Math.PI*2);cx.fill();
  }
  // 水面弧形高光条 (少量大弧)
  cx.globalAlpha=0.25;
  for(let i=0;i<15;i++){
    const x=Math.random()*S;
    const y=Math.random()*S;
    const wl=30+Math.random()*70;
    const gg=cx.createLinearGradient(x,y,x+wl,y+wl*0.2);
    gg.addColorStop(0,   'rgba(180,220,240,0)');
    gg.addColorStop(0.5, 'rgba(180,220,240,0.85)');
    gg.addColorStop(1,   'rgba(180,220,240,0)');
    cx.fillStyle=gg;
    cx.beginPath();cx.ellipse(x+wl/2,y+wl*0.1,wl/2,2,Math.PI*0.2,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;

  const t=new THREE.CanvasTexture(c);
  t.wrapS=THREE.RepeatWrapping;
  t.wrapT=THREE.RepeatWrapping;
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

// ═══════════════════════════════════════
// 湖泊 mesh: 真实地理多边形轮廓 + 地形高度 + 水纹
// ═══════════════════════════════════════
function mkLake(lake){
  // 把经纬度多边形转为世界坐标数组
  const worldPts=lake.pts.map(([lo,la])=>ll2s(lo,la));
  // 构建 THREE.Shape (XY 平面的 2D 多边形)
  // 约定: shape 的 X = world X, shape 的 Y = world Z (因为 ll2s 返回 [x, z])
  const shape=new THREE.Shape();
  shape.moveTo(worldPts[0][0],worldPts[0][1]);
  for(let i=1;i<worldPts.length;i++){
    shape.lineTo(worldPts[i][0],worldPts[i][1]);
  }
  shape.closePath();
  const geo=new THREE.ShapeGeometry(shape,12);
  // 把 XY 平面 shape 转到 XZ 平面 (Y 向上): rotateX(+π/2) 把 (x,y,0) → (x,0,y)
  geo.rotateX(Math.PI/2);

  // 采样多边形内多个点的最低地形高度作为水面 baseline
  // 顶点 + 中心 + 若干内部网格点
  let minH=999;
  worldPts.forEach(([x,z])=>{
    const h=hAtMax(x,z);
    if(h<minH)minH=h;
  });
  // 多边形中心 (顶点质心)
  const cx=worldPts.reduce((s,p)=>s+p[0],0)/worldPts.length;
  const cz=worldPts.reduce((s,p)=>s+p[1],0)/worldPts.length;
  const hCen=hAtMax(cx,cz);
  if(hCen<minH)minH=hCen;
  // 再在中心周围采样几个点 (保险)
  for(let k=0;k<8;k++){
    const a=k/8*Math.PI*2;
    const h=hAtMax(cx+Math.cos(a)*0.4,cz+Math.sin(a)*0.4);
    if(h<minH)minH=h;
  }
  const lakeY=minH+0.10; // 水面略抬起

  const tex=mkLakeTex();
  const mat=new THREE.MeshBasicMaterial({
    map:tex,
    transparent:true,
    opacity:0.95,
    side:THREE.DoubleSide,
    depthWrite:false,
    depthTest:true
  });
  mat.polygonOffset=true;
  mat.polygonOffsetFactor=-8;
  mat.polygonOffsetUnits=-8;
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.y=lakeY;
  mesh.renderOrder=3;
  mesh.userData={name:lake.n,center:new THREE.Vector3(cx,lakeY,cz),phase:Math.random()*6.28};
  lakeMeshes.push(mesh);
  return mesh;
}

// ═══════════════════════════════════════
// 装饰浪花纹理（青金宋韵）
// ═══════════════════════════════════════
function mkDecorativeWaveTex(){
  const W=512,H=256;
  const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d');
  cx.clearRect(0,0,W,H);

  // 单个浪峰 - 占据整张画布
  const baseY=H*0.92;
  const crestH=H*0.72;
  const cxMid=W*0.5;

  // 青蓝渐变填充
  const g=cx.createLinearGradient(0,baseY-crestH,0,baseY);
  g.addColorStop(0,'#7ce0f0');
  g.addColorStop(0.25,'#3ab4d2');
  g.addColorStop(0.55,'#1870b0');
  g.addColorStop(1,'#0a4580');

  cx.fillStyle=g;
  cx.beginPath();
  cx.moveTo(W*0.05,baseY);
  cx.bezierCurveTo(
    W*0.18, baseY-crestH*0.55,
    W*0.32, baseY-crestH*0.95,
    cxMid,  baseY-crestH
  );
  cx.bezierCurveTo(
    W*0.68, baseY-crestH*0.95,
    W*0.82, baseY-crestH*0.55,
    W*0.95, baseY
  );
  cx.lineTo(W*0.05,baseY);
  cx.closePath();
  cx.fill();

  // 金色描边 (主轮廓)
  cx.strokeStyle='#e8c070';
  cx.lineWidth=5;
  cx.lineCap='round';
  cx.beginPath();
  cx.moveTo(W*0.05,baseY);
  cx.bezierCurveTo(
    W*0.18, baseY-crestH*0.55,
    W*0.32, baseY-crestH*0.95,
    cxMid,  baseY-crestH
  );
  cx.bezierCurveTo(
    W*0.68, baseY-crestH*0.95,
    W*0.82, baseY-crestH*0.55,
    W*0.95, baseY
  );
  cx.stroke();

  // 内部金色平行流纹 (层层叠叠)
  for(let layer=1;layer<=6;layer++){
    const off=layer*13;
    cx.strokeStyle=`rgba(235,200,120,${0.88-layer*0.11})`;
    cx.lineWidth=1.8;
    cx.beginPath();
    cx.moveTo(W*0.05+off*0.15,baseY);
    cx.bezierCurveTo(
      W*0.18+off*0.08, baseY-crestH*0.55+off*0.45,
      W*0.32+off*0.04, baseY-crestH*0.95+off*0.7,
      cxMid,           baseY-crestH+off
    );
    cx.bezierCurveTo(
      W*0.68-off*0.04, baseY-crestH*0.95+off*0.7,
      W*0.82-off*0.08, baseY-crestH*0.55+off*0.45,
      W*0.95-off*0.15, baseY
    );
    cx.stroke();
  }

  // 浪尖细波纹
  cx.strokeStyle='rgba(255,250,200,0.7)';
  cx.lineWidth=1;
  for(let i=0;i<3;i++){
    cx.beginPath();
    cx.arc(cxMid,baseY-crestH+i*4,10-i*2,Math.PI*1.2,Math.PI*1.8);
    cx.stroke();
  }

  // 金色珍珠 (浪尖飞溅)
  function drawPearl(x,y,r){
    const g=cx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
    g.addColorStop(0,'#fff8dc');
    g.addColorStop(0.5,'#f0d878');
    g.addColorStop(0.9,'#c89830');
    g.addColorStop(1,'rgba(120,80,20,0)');
    cx.fillStyle=g;
    cx.beginPath();cx.arc(x,y,r,0,6.28);cx.fill();
  }
  // 浪尖附近散布珍珠
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*0.7-Math.PI*0.35-Math.PI/2;
    const dist=8+Math.random()*35;
    const px=cxMid+Math.cos(angle)*dist*1.2;
    const py=baseY-crestH+Math.sin(angle)*dist*0.5;
    drawPearl(px, py, 3+Math.random()*3);
  }
  // 两侧小珍珠
  for(let i=0;i<8;i++){
    const t=Math.random();
    const px=W*0.1+t*W*0.8;
    const py=baseY-crestH*0.3-Math.random()*30;
    drawPearl(px,py,2.5+Math.random()*2);
  }

  const t=new THREE.CanvasTexture(c);
  t.wrapS=THREE.ClampToEdgeWrapping;
  t.wrapT=THREE.ClampToEdgeWrapping;
  t.minFilter=THREE.LinearFilter;
  t.magFilter=THREE.LinearFilter;
  return t;
}

const _sharedWaveTex=mkDecorativeWaveTex();

const waveMeshes=[];
// 动感装饰浪花 - Sprite 面向相机不会变形
// 每个位置由多层 Sprite 组成，有独立的漂浮+摇摆动画
function mkWavePatch(loCen,laCen,loSpan,laSpan,loOff,laOff,name){
  const baseW=3.8;
  const baseH=baseW*0.52;
  const group=new THREE.Group();
  const[ccx,ccz]=ll2s(loCen,laCen);
  const areaW=loSpan*1.6;
  const areaH=laSpan*1.8;
  const cols=Math.max(2,Math.floor(areaW/(baseW*0.70)));
  const rows=Math.max(1,Math.floor(areaH/(baseH*1.4)));

  const sprites=[];
  for(let r=0;r<rows;r++){
    for(let co=0;co<cols;co++){
      // 棋盘错位
      const px=-areaW/2+(co+0.5)*areaW/cols+(r%2?baseW*0.3:0);
      const pz=-areaH/2+(r+0.5)*areaH/rows;
      // 每个位置 2 层（前后层），减少重叠混乱
      const layers=[
        {dy:0.08,scale:1.00,op:1.0,zOff:0,depth:0},     // 前层
        {dy:0.03,scale:0.78,op:0.85,zOff:-0.15,depth:1} // 后层稍小
      ];
      layers.forEach((L,idx)=>{
        const mat=new THREE.SpriteMaterial({
          map:_sharedWaveTex,
          transparent:true,
          opacity:L.op,
          depthWrite:false
        });
        const sp=new THREE.Sprite(mat);
        // 随机微调尺寸增加丰富度
        const jitter=0.88+Math.random()*0.24;
        const sw=baseW*L.scale*jitter;
        const sh=baseH*L.scale*jitter;
        sp.scale.set(sw,sh,1);
        sp.position.set(px, L.dy+sh*0.5, pz+L.zOff);
        sp.renderOrder=5+L.depth;
        sp.userData={
          baseX:px,
          baseY:sp.position.y,
          baseZ:sp.position.z,
          baseW:sw,
          baseH:sh,
          baseOp:L.op,
          phase:Math.random()*Math.PI*2+co*0.4+r*0.3,
          speed:0.9+Math.random()*0.6,
          swayAmp:0.06+Math.random()*0.05,
          bobAmp:0.10+Math.random()*0.08,
          rollSpeed:(Math.random()<0.5?-1:1)*(0.3+Math.random()*0.4)
        };
        group.add(sp);
        sprites.push(sp);
      });
    }
  }
  group.position.set(ccx+loOff,0.02,ccz+laOff);
  group.userData={name,phase:Math.random()*Math.PI*2,sprites};
  waveMeshes.push(group);
  return group;
}

function mkRiver(coords,width,riverName){
  width=width||0.5;
  const ctrl=coords.map(([lo,la])=>{
    const[x,z]=ll2s(lo,la);
    return new THREE.Vector3(x,0,z);
  });
  const curve=new THREE.CatmullRomCurve3(ctrl,false,'catmullrom',0.5);
  const N=Math.max(RIVER_PTS,600);
  const cpts=curve.getPoints(N);
  // 河宽: 发丝化, 按河流大小缩放, 设最小宽度避免远距离不可见
  const rw=Math.max(0.22,width*0.85);
  const hw=rw/2;
  // 河谷采样: 较大窗口找谷底, 不依赖河宽(避免窄河流窗口过小漏采)
  const heights=[];
  const SAMPLE_R=0.60;  // 横向采样半径 (大于任何实际河宽)
  const SAMPLE_L=0.20;  // 纵向采样半径
  for(let i=0;i<cpts.length;i++){
    const p=cpts[i];
    let tx=0,tz=0;
    if(i>0){tx+=p.x-cpts[i-1].x;tz+=p.z-cpts[i-1].z}
    if(i<cpts.length-1){tx+=cpts[i+1].x-p.x;tz+=cpts[i+1].z-p.z}
    const len=Math.hypot(tx,tz)||1;tx/=len;tz/=len;
    const nx=-tz,nz=tx;
    // 在河心附近大窗口采样, 取最低点 (真正的谷底)
    // 使用 hAtMax 取两个 LOD 下的 MAX, 保证 ribbon 高于两种分辨率的地形
    let minH=999;
    for(let k=-5;k<=5;k++){
      const off=k/5*SAMPLE_R;
      for(let df=-2;df<=2;df++){
        const dl=df/2*SAMPLE_L;
        const sx=p.x+nx*off+tx*dl;
        const sz=p.z+nz*off+tz*dl;
        const ys=hAtMax(sx,sz);
        if(ys<minH)minH=ys;
      }
    }
    heights.push(minH);
  }
  // 沿河大窗口平滑 (让水面连续不跳变)
  const smH=new Array(cpts.length);
  const WIN=15;
  for(let i=0;i<cpts.length;i++){
    let s=0,n=0;
    for(let k=-WIN;k<=WIN;k++){
      const j=i+k;if(j<0||j>=cpts.length)continue;
      const w=WIN+1-Math.abs(k);s+=heights[j]*w;n+=w;
    }
    // 水面抬起 0.12 世界单位 (配合 depthTest:false 可保证不被山埋)
    smH[i]=s/n+0.12;
  }
  // 注: 不再强制单调下降 —— 之前的强制会把山区段的水面压到山体以下
  // 让水面自然跟随地形谷底, 配合 depthTest:false 始终可见
  // 应用高度
  cpts.forEach((p,i)=>{p.y=smH[i]});

  // 生成双条带顶点
  const verts=[],uvs=[],indices=[];
  for(let i=0;i<cpts.length;i++){
    const p=cpts[i];
    let tx=0,tz=0;
    if(i>0){tx+=p.x-cpts[i-1].x;tz+=p.z-cpts[i-1].z}
    if(i<cpts.length-1){tx+=cpts[i+1].x-p.x;tz+=cpts[i+1].z-p.z}
    const len=Math.hypot(tx,tz)||1;tx/=len;tz/=len;
    const nx=-tz,nz=tx;
    const wScale=rw*(0.88+0.22*Math.sin(i/cpts.length*Math.PI));
    const half=wScale/2;
    verts.push(p.x+nx*half,p.y,p.z+nz*half,
               p.x-nx*half,p.y,p.z-nz*half);
    const u=i/(cpts.length-1)*6;
    uvs.push(u,0,u,1);
    if(i<cpts.length-1){const b=i*2;indices.push(b,b+1,b+2,b+1,b+3,b+2)}
  }
  const geo=new THREE.BufferGeometry();
  geo.setIndex(indices);
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.computeVertexNormals();
  const tex=mkSilkTex();
  const mat=new THREE.MeshBasicMaterial({
    map:tex,
    transparent:true,
    opacity:1.0,
    side:THREE.DoubleSide,
    depthWrite:false,
    depthTest:true   // 开启深度测试, 山体能正常遮挡河流 (符合直觉)
  });
  // 强力 polygon offset: 防止与地形 z-fighting
  mat.polygonOffset=true;
  mat.polygonOffsetFactor=-10;
  mat.polygonOffsetUnits=-10;
  const mesh=new THREE.Mesh(geo,mat);
  mesh.renderOrder=3;
  const startH=getH(coords[0][0],coords[0][1]);
  const endH=getH(coords[coords.length-1][0],coords[coords.length-1][1]);
  mesh.userData={tex,flow:startH>=endH?-1:1,name:riverName,curvePts:cpts};
  riverMeshes.push(mesh);
  return mesh;
}

const riverLabels=[]; // {el, pos:Vector3, name}
function buildRiverLabels(){
  const cont=document.getElementById('rlbls');
  riverMeshes.forEach((m,idx)=>{
    if(!m.userData.name)return;
    const cpts=m.userData.curvePts;
    const r=RIVERS[idx];
    // lblAt 是控制点索引，转成 cpts 比例位置
    const frac=(r.lblAt||Math.floor(r.c.length/2))/(r.c.length-1);
    const at=Math.min(cpts.length-1,Math.max(0,Math.floor(frac*(cpts.length-1))));
    const p=cpts[at];
    const el=document.createElement('div');
    el.className='rlb';
    el.textContent=m.userData.name;
    cont.appendChild(el);
    riverLabels.push({el,pos:new THREE.Vector3(p.x,p.y+.4,p.z),name:m.userData.name});
  });
}

const cloudGroups=[];

function mkCloudTex(seed){
  const c=document.createElement('canvas');c.width=128;c.height=128;const cx=c.getContext('2d');
  const g=cx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,`rgba(255,255,253,${0.85+seed*0.1})`);
  g.addColorStop(.25,`rgba(252,252,250,${0.7+seed*0.1})`);
  g.addColorStop(.55,'rgba(248,248,246,0.35)');
  g.addColorStop(.85,'rgba(240,240,240,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g;cx.fillRect(0,0,128,128);
  // 蓬松团块
  for(let i=0;i<80;i++){
    const px=20+Math.random()*88,py=20+Math.random()*88,r=Math.random()*22+8;
    const rg=cx.createRadialGradient(px,py,0,px,py,r);
    rg.addColorStop(0,`rgba(255,255,253,${.35+Math.random()*.4})`);
    rg.addColorStop(.6,`rgba(250,250,248,${.15+Math.random()*.15})`);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=rg;cx.beginPath();cx.arc(px,py,r,0,6.28);cx.fill();
  }
  return new THREE.CanvasTexture(c);
}

function mkCloudCluster(x,y,z,baseW,baseH){
  const group=new THREE.Group();
  const layers=3+Math.floor(Math.random()*2);
  for(let j=0;j<layers;j++){
    const yOff=(j-layers/2)*0.7+Math.random()*0.3;
    const sc=0.45+Math.random()*0.45;
    const op=0.42+0.3*(1-Math.abs(j-layers/2)/(layers/2));
    const tex=mkCloudTex(j/layers);
    const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:op,depthWrite:false,fog:true}));
    sprite.scale.set(baseW*sc,baseH*sc*0.5,1);
    sprite.position.set((Math.random()-.5)*baseW*0.4,yOff,(Math.random()-.5)*baseH*0.4);
    group.add(sprite);
  }
  group.position.set(x,y,z);
  group.userData={baseY:y,driftX:(Math.random()-.5)*.12,driftZ:(Math.random()-.5)*.08,phase:Math.random()*6.28};
  scene.add(group);cloudGroups.push(group);
  return group;
}

const beamMeshes=[];
function mkBeamTex(){
  const c=document.createElement('canvas');c.width=64;c.height=256;const cx=c.getContext('2d');
  const g=cx.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'rgba(255,240,190,0)');
  g.addColorStop(0.10,'rgba(255,235,180,0.40)');
  g.addColorStop(0.40,'rgba(255,225,160,0.80)');
  g.addColorStop(0.70,'rgba(255,220,150,0.95)');
  g.addColorStop(0.92,'rgba(255,235,180,1)');
  g.addColorStop(1,'rgba(255,250,220,1)');
  cx.fillStyle=g;cx.fillRect(0,0,64,256);
  // 横向羽化（更尖锐）
  const h=cx.createLinearGradient(0,0,64,0);
  h.addColorStop(0,'rgba(0,0,0,1)');
  h.addColorStop(0.30,'rgba(0,0,0,0.4)');
  h.addColorStop(0.5,'rgba(0,0,0,0)');
  h.addColorStop(0.70,'rgba(0,0,0,0.4)');
  h.addColorStop(1,'rgba(0,0,0,1)');
  cx.globalCompositeOperation='destination-out';
  cx.fillStyle=h;cx.fillRect(0,0,64,256);
  cx.globalCompositeOperation='source-over';
  return new THREE.CanvasTexture(c);
}
const beamTex=mkBeamTex();

function mkLightBeam(x,y,z){
  const matB=new THREE.SpriteMaterial({map:beamTex,color:0xffe2a8,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
  const sp=new THREE.Sprite(matB);
  const beamH=7+Math.random()*2;
  sp.scale.set(0.30,beamH,1);
  sp.position.set(x,y+beamH/2,z);
  sp.userData={baseY:y,h:beamH,phase:Math.random()*Math.PI*2,target:0,current:0};
  beamMeshes.push(sp);
  scene.add(sp);
  const matG=new THREE.SpriteMaterial({map:beamTex,color:0xffd890,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
  const halo=new THREE.Sprite(matG);
  halo.scale.set(1.1,1.1,1);
  halo.position.set(x,y+0.25,z);
  halo.userData={isHalo:true,phase:Math.random()*Math.PI*2,target:0,current:0};
  beamMeshes.push(halo);
  scene.add(halo);
  return [sp,halo];
}

function setBeam(i,on){
  const b=locBeams[i];
  if(!b)return;
  b[0].userData.target=on?0.85:0;
  b[1].userData.target=on?0.40:0;
}
// 光柱脉冲: 瞬间拉高再回到常亮, 视觉确认"正在朗读这首诗"
function pulseBeam(i){
  const b=locBeams[i];
  if(!b)return;
  b[0].userData.target=1.2;
  b[1].userData.target=0.75;
  setTimeout(()=>{
    if(activeI===i){
      b[0].userData.target=0.85;
      b[1].userData.target=0.40;
    }
  },500);
}

// ═══════════════════════════════════════
// 语音朗读: 分句多段 + 抑扬顿挫, 优先神经网络音色
// 如果有 assets/audio/<地点>/<标题>.mp3, 优先播放本地录音 (专业朗读)
// ═══════════════════════════════════════
let speaking=false,currentSpeakEl=null,currentAudio=null;
function stopSpeak(){
  if(currentAudio){try{currentAudio.pause();}catch(e){} currentAudio=null;}
  if(speaking)speechSynthesis.cancel();
  speaking=false;
  if(currentSpeakEl){currentSpeakEl.classList.remove('pt-speaking');currentSpeakEl=null;}
}
// 选择最好的中文 TTS 音色: 优先神经网络/自然音 > 女声 > 任意中文
function pickBestVoice(){
  const voices=speechSynthesis.getVoices();
  const zh=voices.filter(v=>v.lang&&v.lang.startsWith('zh'));
  // 神经网络音 (Edge 的 Yunxi/Xiaoxiao Natural, Chrome 的某些音)
  let v=zh.find(vv=>/Natural|Neural/i.test(vv.name));
  // 女声优先 (诗词用女声更柔)
  if(!v)v=zh.find(vv=>/Female|晓|云|Xiaoxiao|Yunxi|Xiaoyi|Xiaochen|Tingting/i.test(vv.name));
  // 任何中文
  if(!v)v=zh[0];
  return v;
}
function mkUtt(text,rate,pitch,volume){
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';
  u.rate=rate;
  u.pitch=pitch;
  u.volume=volume||1.0;
  const v=pickBestVoice();
  if(v)u.voice=v;
  return u;
}
function speakPoem(poem,titleEl){
  // 同一标题二次点击 = 停止
  if(currentSpeakEl===titleEl&&speaking){stopSpeak();return;}
  stopSpeak();
  currentSpeakEl=titleEl;
  if(titleEl)titleEl.classList.add('pt-speaking');
  speaking=true;

  // 路径 1: 尝试加载本地 MP3 录音 (assets/audio/<loc>/<title>.mp3)
  // 如果文件存在则播放, 否则回退到 TTS
  const loc=activeI>=0?L[activeI]:null;
  const audioPath=loc?'assets/audio/'+encodeURIComponent(loc.n)+'/'+encodeURIComponent(poem.t)+'.mp3':null;
  const tryAudio=new Promise((resolve,reject)=>{
    if(!audioPath){reject();return;}
    const a=new Audio(audioPath);
    a.addEventListener('canplay',()=>resolve(a),{once:true});
    a.addEventListener('error',()=>reject(),{once:true});
    a.load();
    // 300ms 超时
    setTimeout(()=>reject(),300);
  });
  tryAudio.then(a=>{
    currentAudio=a;
    a.play().catch(()=>fallbackTTS());
    a.addEventListener('ended',()=>{
      speaking=false;
      if(titleEl)titleEl.classList.remove('pt-speaking');
      currentAudio=null;
      if(currentSpeakEl===titleEl)currentSpeakEl=null;
    });
  }).catch(()=>fallbackTTS());

  function fallbackTTS(){
    // 路径 2: 分句多段 TTS, 每句微调 rate/pitch 产生抑扬顿挫
    // 标题 + 作者开场
    const utterances=[];
    utterances.push(mkUtt(poem.t+'，'+poem.a,0.78,1.02));
    // 诗句: 慢速 + 轻微 pitch 波动 (模拟吟诵的抑扬)
    poem.l.forEach((line,idx)=>{
      // 偶数行稍高, 奇数行稍低, 最后一行再放慢
      const isLast=(idx===poem.l.length-1);
      const rate=isLast?0.68:0.74+(idx%2)*0.02;
      // sin 波动 ±6% pitch
      const pitch=1.0+Math.sin(idx*0.9)*0.06;
      utterances.push(mkUtt(line,rate,pitch));
    });
    // 串行播放: 上一句结束才开始下一句
    let idx=0;
    function next(){
      if(idx>=utterances.length||!speaking){
        speaking=false;
        if(titleEl)titleEl.classList.remove('pt-speaking');
        if(currentSpeakEl===titleEl)currentSpeakEl=null;
        return;
      }
      const u=utterances[idx++];
      u.onend=()=>setTimeout(next,180); // 句间停顿 180ms
      u.onerror=u.onend;
      speechSynthesis.speak(u);
    }
    next();
  }
}

function selectLoc(i){
  activeI=i;const loc=L[i],p=pos3D[i];
  stopSpeak();
  lbls.forEach((e,j)=>e.classList.toggle('on',j===i));
  locBeams.forEach((b,j)=>{if(b){b[0].userData.target=j===i?0.85:0;b[1].userData.target=j===i?0.40:0}});
  // 卷轴已移到屏幕下方, 让相机看点稍微偏下, 使地点和光柱出现在屏幕上半部分
  camTo=new THREE.Vector3(p.x+4,p.y+10,p.z+15);
  lookTo=new THREE.Vector3(p.x,p.y-4,p.z-2);
  isAnim=true;
  let h='<div class="ph"><div class="pln">'+loc.n+'</div></div><div class="pms">';
  loc.ps.forEach((p,pi)=>{
    // 标题字号自动缩放: 按字数阶梯
    const tl=p.t.length;
    const titleCls=tl>8?'pt pt-xs':(tl>6?'pt pt-s':(tl>4?'pt pt-m':'pt'));
    // 突出展示: 首篇(或显式 hl 标记)
    const hlCls=(p.hl===true||(p.hl!==false&&pi===0))?' hl':'';
    h+='<div class="pe'+hlCls+'"><div class="pm"><div class="ps">'+p.d+'</div><div class="'+titleCls+'" data-pi="'+pi+'" title="点击朗读">'+p.t+'</div><div class="pa">'+p.a+'</div>';
    if(p.excerpt)h+='<div class="pexc">节选</div>';
    h+='</div><div class="pl">';
    p.l.forEach((l,li)=>{h+=`<div class="pv" style="animation-delay:${(pi*.20+li*.06+.20).toFixed(2)}s">${l}</div>`});
    h+='</div></div>';
  });
  h+='</div>';pc.innerHTML=h;po.classList.add('vis');
  // 绑定每首诗标题的点击朗读
  pc.querySelectorAll('.pt').forEach(el=>{
    el.addEventListener('click',ev=>{
      ev.stopPropagation();
      const pi=parseInt(el.dataset.pi,10);
      const poem=loc.ps[pi];
      if(poem){
        speakPoem(poem,el);
        // 点击标题时让对应地点的光柱脉冲一次 (视觉确认"正在朗读这首诗")
        pulseBeam(activeI);
      }
    });
  });
  // 重置滚动位置 + 卷轴纹理位置 + 更新箭头显示
  requestAnimationFrame(()=>{
    const box=document.getElementById('po-box');
    // row-reverse: 第一首在视觉右侧, 初始滚动到右端
    box.scrollLeft=box.scrollWidth-box.clientWidth;
    document.querySelectorAll('.roller-wood').forEach(el=>{el.style.backgroundPositionY='0px'});
    updateArrows();
  });
}
// 滚动箭头显示逻辑
function updateArrows(){
  const box=document.getElementById('po-box');
  if(!box)return;
  const arrL=document.getElementById('po-arr-l');
  const arrR=document.getElementById('po-arr-r');
  const maxScroll=box.scrollWidth-box.clientWidth;
  if(maxScroll<5){
    arrL&&arrL.classList.remove('show');
    arrR&&arrR.classList.remove('show');
    return;
  }
  // row-reverse: 第一首在视觉右, 滚动到右端 = scrollLeft == maxScroll
  // 向右箭头 = 右侧还有内容 (scrollLeft < maxScroll)
  // 向左箭头 = 左侧还有内容 (scrollLeft > 0)
  const canRight=box.scrollLeft<maxScroll-5;
  const canLeft=box.scrollLeft>5;
  arrR&&arrR.classList.toggle('show',canRight);
  arrL&&arrL.classList.toggle('show',canLeft);
  // 首次打开时 "呼吸" 提示用户可以滑动 (如果两侧都可滚)
  if(arrR&&canRight&&!arrR.dataset.hinted){
    arrR.classList.add('po-arr-breathe');
    arrR.dataset.hinted='1';
    setTimeout(()=>arrR.classList.remove('po-arr-breathe'),4000);
  }
}
function closePo(){po.classList.remove('vis');lbls.forEach(e=>e.classList.remove('on'));locBeams.forEach(b=>{if(b){b[0].userData.target=0;b[1].userData.target=0}});activeI=-1;stopSpeak();}

// ═══════════════════════════════════════
// 卷轴水平拖动 + 轴柄纹理联动
// ═══════════════════════════════════════
(function setupScrollDrag(){
  const box=document.getElementById('po-box');
  if(!box)return;
  let dragging=false,startX=0,startScroll=0,dragMoved=false;
  box.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    // 不影响按钮点击
    if(e.target.closest('#po-x')||e.target.closest('.po-arr')||e.target.closest('.pt'))return;
    dragging=true;
    dragMoved=false;
    startX=e.clientX;
    startScroll=box.scrollLeft;
    box.classList.add('dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=e.clientX-startX;
    if(Math.abs(dx)>2)dragMoved=true;
    box.scrollLeft=startScroll-dx;
  });
  window.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;box.classList.remove('dragging');}
  });
  // 触摸支持
  box.addEventListener('touchstart',e=>{
    if(e.target.closest('#po-x')||e.target.closest('.po-arr')||e.target.closest('.pt'))return;
    dragging=true;
    startX=e.touches[0].clientX;
    startScroll=box.scrollLeft;
  },{passive:true});
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-startX;
    box.scrollLeft=startScroll-dx;
  },{passive:true});
  window.addEventListener('touchend',()=>{dragging=false});
  // 滚动时联动轴柄纹理 + 更新箭头
  box.addEventListener('scroll',()=>{
    const off=box.scrollLeft*0.7;
    const rollers=document.querySelectorAll('.roller-wood');
    if(rollers[0])rollers[0].style.backgroundPositionY=(-off)+'px, '+(-off*2)+'px';
    if(rollers[1])rollers[1].style.backgroundPositionY=(off)+'px, '+(off*2)+'px';
    if(typeof updateArrows==='function')updateArrows();
  });
  // 鼠标滚轮: 纵向滚动变横向滚动
  box.addEventListener('wheel',e=>{
    if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
      box.scrollLeft-=e.deltaY;
      e.preventDefault();
    }
  },{passive:false});
  // 箭头按钮: 点击平滑滚动一屏
  const arrL=document.getElementById('po-arr-l');
  const arrR=document.getElementById('po-arr-r');
  if(arrL)arrL.addEventListener('click',ev=>{
    ev.stopPropagation();
    box.scrollBy({left:-Math.max(260,box.clientWidth*0.7),behavior:'smooth'});
  });
  if(arrR)arrR.addEventListener('click',ev=>{
    ev.stopPropagation();
    box.scrollBy({left:Math.max(260,box.clientWidth*0.7),behavior:'smooth'});
  });
})();

async function init(){
  try{hd=await Promise.race([loadDEM(),new Promise(r=>setTimeout(()=>r(null),12000))])}catch(e){hd=null}

  // ═══ 分层渲染 LOD ═══
  // 高分辨率层: 拉近时使用, 2.6M 顶点 (4x 线性)
  prog.style.width='40%';
  const terrainHi=await buildTerrain(SGWT,SGHT);
  await carveRivers(terrainHi,SGWT,SGHT);
  terrainRef=terrainHi; // hMap 从高分辨率采样, 保证标签位置精确
  prog.style.width='62%';

  // 低分辨率层: 拉远时使用, 164K 顶点, 构建很快
  const terrainLo=await buildTerrain(LOD_LO_W,LOD_LO_H);
  await carveRivers(terrainLo,LOD_LO_W,LOD_LO_H);
  terrainLoRef=terrainLo; // 保留引用以构建 hMapLo
  prog.style.width='70%';

  // 组装 THREE.LOD: 相机距离 < 95 用高分, >= 95 用低分
  // Three.js LOD 的 distance 是"此级别开始使用的最小距离"
  terrainLOD=new THREE.LOD();
  terrainLOD.addLevel(terrainHi,0);
  terrainLOD.addLevel(terrainLo,LOD_SWITCH_DIST);
  scene.add(terrainLOD);

  // ★ 构建两套高度图: 高分用于标签定位, 低分用于 hAtMax 避免河流陷入低分地形 ★
  buildHMap();
  buildHMapLo();
  // 海面由地形自身处理（海域按水色着色），不再单独添加
  prog.style.width='80%';

  // 河流: 发丝化细线 mesh + 流动纹理
  // 顶点色只做"湿润暗示", 主视觉由这里的细 mesh 承担
  RIVERS.forEach(r=>scene.add(mkRiver(r.c,r.w,r.n)));
  buildRiverLabels();
  // 湖泊: 椭圆盘水面, 按 hAtMax 采样高度贴合地形
  LAKES.forEach(l=>scene.add(mkLake(l)));
  buildLakeLabels();
  prog.style.width='85%';

  // 台湾海峡浪花（台湾与福建之间）
  scene.add(mkWavePatch(119.5,23.5,3.2,3.6,0,0,'台湾海峡'));
  // 琼州海峡浪花（海南与广东之间）
  scene.add(mkWavePatch(110.3,20.4,2.6,1.4,0,0,'琼州海峡'));
  // 渤海（东北方向）
  scene.add(mkWavePatch(120,38.5,3.2,2.8,0,0,'渤海'));

  // ★ 用高度图精确设定标签位置，不再浮空 ★
  L.forEach((loc,i)=>{
    const[sx,sz]=ll2s(loc.lo,loc.la);
    const y=hAt(sx,sz);
    const yT=Math.max(.05,y)+.15;
    pos3D[i].set(sx,yT,sz);
    locBeams[i]=mkLightBeam(sx,yT,sz);
  });
  prog.style.width='90%';

  // 体积云
  for(let i=0;i<CLOUD_N;i++){
    const lo=80+Math.random()*44,la=21+Math.random()*26;
    const[x,z]=ll2s(lo,la);const hm=getH(lo,la);
    const y=Math.max(5,scaleH(isFinite(hm)?hm:500))+4+Math.random()*5;
    mkCloudCluster(x,y,z,9+Math.random()*15,6+Math.random()*10);
  }
  prog.style.width='100%';

  animate();
  setTimeout(()=>{const ld=document.getElementById('ld');ld.classList.add('off');setTimeout(()=>ld.remove(),800)},500);
}

const tv=new THREE.Vector3();let lastCam='';const clock=new THREE.Clock();
let frameCount=0;

function animateSea(t){}

function updateLabels(){
  const cs=camera.position.toArray().map(v=>v.toFixed(1)).join(',');
  if(cs===lastCam)return;lastCam=cs;
  const w=window.innerWidth,h=window.innerHeight;
  for(let i=0;i<L.length;i++){
    const p=pos3D[i],el=lbls[i];
    const dist=camera.position.distanceTo(p);
    if(dist>130){el.style.display='none';continue}
    tv.copy(p).project(camera);
    if(tv.z>1){el.style.display='none';continue}
    const sx=(tv.x*.5+.5)*w,sy=-(tv.y*.5-.5)*h;
    if(sx<-80||sx>w+80||sy<-80||sy>h+80){el.style.display='none';continue}
    el.style.display='';
    const sc=Math.max(.55,Math.min(1.4,32/dist));
    el.style.left=sx+'px';el.style.top=sy+'px';
    el.style.transform=`translate(-50%,-100%) scale(${sc.toFixed(3)})`;
    el.style.opacity=Math.min(1,Math.max(.4,1-dist/110)).toFixed(2);
    // 诗句渐显
    const pf=el.querySelector('.pf');
    if(pf){if(dist<15){pf.style.display='';pf.style.opacity='.85'}else if(dist<24){pf.style.display='';pf.style.opacity=((24-dist)/9*.7).toFixed(2)}else{pf.style.display='none'}}
  }
  // 河流标签
  for(let i=0;i<riverLabels.length;i++){
    const rl=riverLabels[i];
    const dist=camera.position.distanceTo(rl.pos);
    if(dist>140){rl.el.style.display='none';continue}
    tv.copy(rl.pos).project(camera);
    if(tv.z>1){rl.el.style.display='none';continue}
    const sx=(tv.x*.5+.5)*w,sy=-(tv.y*.5-.5)*h;
    if(sx<-50||sx>w+50||sy<-50||sy>h+50){rl.el.style.display='none';continue}
    rl.el.style.display='';
    const sc=Math.max(.7,Math.min(1.6,42/dist));
    rl.el.style.left=sx+'px';rl.el.style.top=sy+'px';
    rl.el.style.transform=`translate(-50%,-50%) scale(${sc.toFixed(3)})`;
    rl.el.style.opacity=Math.min(.98,Math.max(.7,1.4-dist/130)).toFixed(2);
  }
  // 湖泊标签
  for(let i=0;i<lakeLabels.length;i++){
    const ll=lakeLabels[i];
    const dist=camera.position.distanceTo(ll.pos);
    if(dist>150){ll.el.style.display='none';continue}
    tv.copy(ll.pos).project(camera);
    if(tv.z>1){ll.el.style.display='none';continue}
    const sx=(tv.x*.5+.5)*w,sy=-(tv.y*.5-.5)*h;
    if(sx<-50||sx>w+50||sy<-50||sy>h+50){ll.el.style.display='none';continue}
    ll.el.style.display='';
    const sc=Math.max(.65,Math.min(1.5,38/dist));
    ll.el.style.left=sx+'px';ll.el.style.top=sy+'px';
    ll.el.style.transform=`translate(-50%,-50%) scale(${sc.toFixed(3)})`;
    ll.el.style.opacity=Math.min(.96,Math.max(.65,1.35-dist/135)).toFixed(2);
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(),t=clock.getElapsedTime();
  frameCount++;

  if(isAnim&&camTo&&lookTo){camera.position.lerp(camTo,.04);controls.target.lerp(lookTo,.04);if(camera.position.distanceTo(camTo)<.2)isAnim=false}

  // ★ 限制拖拽范围在地形区域内 ★
  controls.target.x=Math.max(-50,Math.min(100,controls.target.x));
  controls.target.z=Math.max(-25,Math.min(80,controls.target.z));
  controls.target.y=Math.max(-2,Math.min(15,controls.target.y));
  controls.update();

  // 河流丝绸流淌
  riverMeshes.forEach(m=>{
    m.userData.tex.offset.x+=dt*0.045*m.userData.flow;
    m.material.opacity=0.88+Math.sin(t*0.6+m.userData.flow)*0.05;
  });

  // 海峡浪花：动感漂浮 + 摇摆 + 缩放呼吸
  waveMeshes.forEach(g=>{
    const u=g.userData;
    const sprites=u.sprites;
    if(!sprites)return;
    sprites.forEach(sp=>{
      const d=sp.userData;
      const ph=t*d.speed+d.phase;
      // 上下浮动
      sp.position.y=d.baseY+Math.sin(ph)*d.bobAmp;
      // 左右轻微摇摆
      sp.position.x=d.baseX+Math.cos(ph*0.7)*d.swayAmp;
      // 前后浮动
      sp.position.z=d.baseZ+Math.sin(ph*0.5)*d.swayAmp*0.6;
      // 缩放呼吸（浪涌效果）
      const scaleK=1+Math.sin(ph*0.8)*0.08;
      sp.scale.set(d.baseW*scaleK,d.baseH*(1+Math.sin(ph*0.8+1)*0.12),1);
      // 旋转（通过 material.rotation）
      sp.material.rotation=Math.sin(ph*0.5)*0.12*d.rollSpeed;
      // 透明度呼吸
      sp.material.opacity=d.baseOp*(0.75+Math.sin(ph*0.6)*0.22);
    });
  });

  // 金色光柱 - 仅悬停时显示
  beamMeshes.forEach(s=>{
    const u=s.userData;
    u.current+=(u.target-u.current)*0.15;
    const breath=u.isHalo?(0.85+Math.sin(t*0.9+u.phase)*0.20):(0.92+Math.sin(t*0.6+u.phase)*0.15);
    s.material.opacity=u.current*breath;
    s.visible=u.current>0.01;
  });

  // 海浪（每3帧更新一次节省性能）
  if(frameCount%3===0)animateSea(t);

  // 体积云飘动 + 拉近拨开
  cloudGroups.forEach(cg=>{
    const d=cg.userData;
    cg.position.x+=d.driftX*dt;cg.position.z+=d.driftZ*dt;
    cg.position.y=d.baseY+Math.sin(t*.25+d.phase)*.6;
    const dist=camera.position.distanceTo(cg.position);
    const breath=.85+Math.sin(t*.2+d.phase)*.12;
    // 近处淡出，远处全显
    const fade=dist<6?0:dist<18?(dist-6)/12:1;
    cg.children.forEach(s=>{s.material.opacity=(s.userData_baseOp||0.6)*breath*fade});
  });

  updateLabels();
  // LOD: 根据相机距离自动切换高/低分辨率地形
  if(terrainLOD)terrainLOD.update(camera);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);lastCam=''});
window.addEventListener('keydown',e=>{if(e.key==='Escape')closePo()});

// 存储每个云层sprite的基础透明度
function finalizeCloudOpacity(){
  cloudGroups.forEach(cg=>{
    cg.children.forEach(s=>{s.userData_baseOp=s.material.opacity||0.2});
  });
}

// 启动
init().then(()=>{finalizeCloudOpacity()});
</script>
</body>
</html>
